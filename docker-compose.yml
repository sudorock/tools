name: tools

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tools.qdrant
    ports:
      - "7533:6333"
      - "7534:6334"
    volumes:
      - ./qdrant/storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/6333; printf 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200' <&3"]
      interval: 10s
      timeout: 3s
      retries: 10
